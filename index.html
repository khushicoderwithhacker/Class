<style>
    body{
        display:flex;

        color:white;
        font-family:Arial;
    }

    .spinner{
        width:50px;
        height:50px;
        border:5px solid #ccc;
        border-top:5px solid white;
        border-radius:50%;
        animation:spin 1s linear infinite;
    }

    @keyframes spin{
        from{
            transform:rotate(0deg);
        }
        to{
            transform:rotate(360deg);
        }
    }
</style>

</head>

<body>
    <div class="spinner"></div>
    <h2>Loading...</h2>
